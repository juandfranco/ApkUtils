name: Build Windows EXE

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Compilar EXE
        run: python -m PyInstaller --noconfirm apkrenamer.spec

      - name: Publicar artefacto
        uses: actions/upload-artifact@v4
        with:
          name: ApkRenamer-windows
          path: dist/ApkRenamer.exe

      # Publica el .exe como Release descargable (solo en la rama main).
      - name: Publicar Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: ApkRenamer (último build)
          body: |
            Versión más reciente de **ApkRenamer.exe**.

            Descarga el `.exe` de abajo, ejecútalo y listo. La primera vez
            descarga solo Java + apktool + firmador (necesita internet).
          files: dist/ApkRenamer.exe
          make_latest: true
